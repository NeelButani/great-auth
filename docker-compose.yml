services:
  # ─────────────────────────────────────────
  # PostgreSQL Container
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: auth_postgres
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Redis Container
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: auth_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────
  # Node.js App Container
  # ─────────────────────────────────────────
  app:
    build: .
    container_name: auth_app
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - .:/app
      # This protects the container's freshly installed node_modules
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

# ─────────────────────────────────────────
# Named Volumes
# ─────────────────────────────────────────
volumes:
  postgres_data:
  redis_data: